<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Contract Aegis</title>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .loading {
            text-align: center;
        }
        .loading p {
            font-size: 16px;
            color: #94a3b8;
            margin-top: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Loading checkout...</p>
    </div>

    <script>
        // Paddle.js auto-opens checkout when _ptxn param is present
        Paddle.Environment.set('sandbox');
        Paddle.Initialize({
            token: 'test_8a14264d5dcefdaeb8b21422c79',
            checkout: {
                settings: {
                    theme: 'dark',
                    successUrl: 'https://www.contractaegis.com/success.html'
                }
            }
        });
    </script>
</body>
</html>
