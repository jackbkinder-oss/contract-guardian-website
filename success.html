<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — Contract Aegis</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav id="mainNav" class="scrolled">
    <div class="nav-inner">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="nav-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="nav-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z" stroke="url(#nav-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 12l2 2 4-4" stroke="url(#nav-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Contract Aegis</span>
        </a>
    </div>
</nav>

<main class="auth-page">
    <div class="auth-glow"></div>
    <div class="auth-card" style="text-align:center;">
        <div style="font-size:48px; margin-bottom:16px;">&#10003;</div>
        <h1 class="auth-title">Success!</h1>
        <p class="auth-subtitle" id="successMsg">Now download Contract Aegis and login to start analysing your contracts!</p>
        <a href="index.html#download" class="auth-submit" style="display:inline-block; text-decoration:none; margin-top:20px;">Download Contract Aegis</a>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan');
    const msgEl = document.getElementById('successMsg');
    if (plan === 'payg') {
        msgEl.textContent = 'Your analysis credits have been added. Open the Contract Aegis app to start analyzing contracts.';
    } else if (plan && plan.startsWith('pro')) {
        msgEl.textContent = 'Your Pro subscription is now active. Open the Contract Aegis app to enjoy all features.';
    }
</script>
</body>
</html>
