<!-- ─── LOGIN PAGE ────────────────────────────────── -->
<main class="auth-page">
    <div class="auth-glow"></div>

    <div class="auth-card">
        <div class="auth-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="card-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="card-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z" stroke="url(#card-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 12l2 2 4-4" stroke="url(#card-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Contract Aegis
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Log in to your account to access your contract analysis history and settings.</p>

        <form class="auth-form" id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="jane@example.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <!-- Inline error message -->
            <div id="formError" style="
                display: none;
                background: rgba(239,68,68,0.1);
                border: 1px solid rgba(239,68,68,0.3);
                border-radius: 8px;
                padding: 10px 14px;
                font-size: 13px;
                color: #ef4444;
            "></div>

            <button type="submit" class="auth-submit" id="submitBtn">
                Log In
            </button>
        </form>

        <p class="auth-footer-text">
            Don't have an account? <a id="signupLink" href="signup.html">Sign up free</a>
        </p>
    </div>
</main>

<script>
    const SUPABASE_URL = 'https://xdhmexgxhjalxieiwzcj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkaG1leGd4aGphbHhpZWl3emNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNjczOTUsImV4cCI6MjA4Nzg0MzM5NX0.kqIGkdEpvNosppqZMmXPTDfdqiTs95ZTc8I7fIABIaM';

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');

    function showError(msg) {
        formError.textContent = msg;
        formError.style.display = 'block';
    }

    function hideError() {
        formError.style.display = 'none';
    }

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Email/password login
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email    = form.email.value.trim();
        const password = form.password.value;

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('Please enter a valid email address.');
            return;
        }
        if (!password) {
            showError('Please enter your password.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in\u2026';

        const passwordHash = await hashPassword(password);

        try {
            const resp = await fetch(
                `${SUPABASE_URL}/rest/v1/users?email=eq.${encodeURIComponent(email.toLowerCase())}&password_hash=eq.${encodeURIComponent(passwordHash)}&select=id,email`,
                { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
            );
            const rows = await resp.json();

            if (!rows || rows.length === 0) {
                showError('Invalid email or password.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
                return;
            }

            const data = rows[0];
            localStorage.setItem('cg_user', JSON.stringify({
                id: data.id,
                email: data.email
            }));
        } catch {
            showError('Something went wrong. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
            return;
        }

        // Check if there's a plan param — redirect to checkout instead of index
        const urlParams = new URLSearchParams(window.location.search);
        const planParam = urlParams.get('plan');
        window.location.href = planParam ? `index.html?plan=${planParam}` : 'index.html';
    });

    // Preserve plan param in signup link
    (function() {
        const p = new URLSearchParams(window.location.search).get('plan');
        if (p) {
            const link = document.getElementById('signupLink');
            if (link) link.href = `signup.html?plan=${p}`;
        }
    })();
</script>
</body>
</html>
