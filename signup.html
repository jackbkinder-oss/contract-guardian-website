<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Contract Guardian</title>
    <meta name="description" content="Create your Contract Guardian account and start protecting yourself from risky freelance contracts.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ─── NAV ───────────────────────────────────────── -->
<nav id="mainNav" class="scrolled">
    <div class="nav-inner">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="nav-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="nav-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="url(#nav-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <polyline points="14,2 14,8 20,8" stroke="url(#nav-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 15l2 2 4-4" stroke="url(#nav-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Contract Guardian</span>
        </a>
        <div class="nav-actions" style="margin-left:auto;">
            <a href="login.html" class="nav-btn nav-btn-ghost">Log In</a>
        </div>
    </div>
</nav>

<!-- ─── SIGN UP PAGE ───────────────────────────────── -->
<main class="auth-page">
    <div class="auth-glow"></div>

    <div class="auth-card">
        <div class="auth-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="card-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="card-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="url(#card-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <polyline points="14,2 14,8 20,8" stroke="url(#card-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 15l2 2 4-4" stroke="url(#card-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Contract Guardian
        </div>

        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Start analyzing freelance contracts with AI — free to get started.</p>

        <button class="auth-google-btn" id="googleBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
        </button>

        <div class="auth-divider">
            <span>or</span>
        </div>

        <form class="auth-form" id="signupForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="jane@example.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="At least 8 characters"
                    autocomplete="new-password"
                    required
                    minlength="8"
                >
            </div>

            <!-- Inline error message -->
            <div id="formError" style="
                display: none;
                background: rgba(239,68,68,0.1);
                border: 1px solid rgba(239,68,68,0.3);
                border-radius: 8px;
                padding: 10px 14px;
                font-size: 13px;
                color: #ef4444;
            "></div>

            <button type="submit" class="auth-submit" id="submitBtn">
                Create Free Account
            </button>
        </form>

        <p class="auth-terms">
            By signing up, you agree to our
            <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.
        </p>

        <p class="auth-footer-text">
            Already have an account? <a href="login.html">Log in</a>
        </p>
    </div>
</main>

<script>
    const sb = window.supabase.createClient(
        'https://xdhmexgxhjalxieiwzcj.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkaG1leGd4aGphbHhpZWl3emNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNjczOTUsImV4cCI6MjA4Nzg0MzM5NX0.kqIGkdEpvNosppqZMmXPTDfdqiTs95ZTc8I7fIABIaM'
    );

    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');

    function showError(msg) {
        formError.textContent = msg;
        formError.style.display = 'block';
    }

    function hideError() {
        formError.style.display = 'none';
    }

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Google sign-up
    document.getElementById('googleBtn').addEventListener('click', async () => {
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/index.html'
            }
        });
        if (error) showError(error.message);
    });

    // Email/password sign-up
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email    = form.email.value.trim();
        const password = form.password.value;

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('Please enter a valid email address.');
            return;
        }
        if (password.length < 8) {
            showError('Password must be at least 8 characters.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account…';

        const passwordHash = await hashPassword(password);

        const { data, error } = await sb
            .from('users')
            .insert([{
                first_name: '',
                last_name: '',
                email: email.toLowerCase(),
                password_hash: passwordHash
            }])
            .select();

        if (error) {
            if (error.code === '23505') {
                showError('An account with this email has already been made.');
            } else {
                showError(error.message);
            }
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Free Account';
            return;
        }

        localStorage.setItem('cg_user', JSON.stringify({
            id: data[0].id,
            email: email.toLowerCase()
        }));

        submitBtn.textContent = '✓ Account Created!';
        submitBtn.style.background = 'linear-gradient(135deg, #34d399, #06b6d4)';

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1500);
    });
</script>
</body>
</html>
