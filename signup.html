<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Sign Up ‚Äî Contract Guardian</title>
    <meta name="description" content="Create your Contract Guardian account and start protecting yourself from risky freelance contracts.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ‚îÄ‚îÄ‚îÄ NAV ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ -->

    <div class="nav-inner">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="nav-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="nav-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="url(#nav-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <polyline points="14,2 14,8 20,8" stroke="url(#nav-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 15l2 2 4-4" stroke="url(#nav-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>

        <div class="nav-actions" style="margin-left:auto;">

<!-- ‚îÄ‚îÄ‚îÄ SIGN UP PAGE ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ -->
<main class="auth-page">
    <div class="auth-glow"></div>

    <div class="auth-card">
        <div class="auth-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="card-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="card-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="url(#card-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <polyline points="14,2 14,8 20,8" stroke="url(#card-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 15l2 2 4-4" stroke="url(#card-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Contract Guardian
        </div>

        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Start analyzing freelance contracts with AI ‚Äî free to get started.</p>

        <form class="auth-form" id="signupForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input
                        type="text"
                        id="firstName"
                        name="firstName"
                        placeholder="Jane"
                        autocomplete="given-name"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input
                        type="text"
                        id="lastName"
                        name="lastName"
                        placeholder="Smith"
                        autocomplete="family-name"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="jane@example.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="At least 8 characters"
                    autocomplete="new-password"
                    required
                    minlength="8"
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Repeat your password"
                    autocomplete="new-password"
                    required
                >
            </div>

            <!-- Inline error message -->
            <div id="formError" style="
                display: none;
                background: rgba(239,68,68,0.1);
                border: 1px solid rgba(239,68,68,0.3);
                border-radius: 8px;
                padding: 10px 14px;
                font-size: 13px;
                color: #ef4444;
            "></div>

            <button type="submit" class="auth-submit" id="submitBtn">
                Create Free Account
            </button>
        </form>

        <p class="auth-terms">
            By signing up, you agree to our
            <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.
        </p>

        <p class="auth-footer-text">
            Already have an account? <a href="login.html">Log in</a>
        </p>
    </div>
</main>

<script>
    const supabase = window.supabase.createClient(
        'https://xdhmexgxhjalxieiwzcj.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkaG1leGd4aGphbHhpZWl3emNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNjczOTUsImV4cCI6MjA4Nzg0MzM5NX0.kqIGkdEpvNosppqZMmXPTDfdqiTs95ZTc8I7fIABIaM'
    );

    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');

    function showError(msg) {
        formError.textContent = msg;
        formError.style.display = 'block';
    }

    function hideError() {
        formError.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const firstName = form.firstName.value.trim();
        const lastName  = form.lastName.value.trim();
        const email     = form.email.value.trim();
        const password  = form.password.value;
        const confirm   = form.confirmPassword.value;

        if (!firstName || !lastName) {
            showError('Please enter your first and last name.');
            return;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('Please enter a valid email address.');
            return;
        }
        if (password.length < 8) {
            showError('Password must be at least 8 characters.');
            return;
        }
        if (password !== confirm) {
            showError('Passwords do not match.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account‚Ä¶';

        let result;
        try {
            result = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        first_name: firstName,
                        last_name: lastName
                    }
                }
            });
            console.log('Supabase response:', JSON.stringify(result));
        } catch (err) {
            console.error('Supabase exception:', err);
            showError('Connection error: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Free Account';
            return;
        }

        const { data, error } = result;

        if (error) {
            console.error('Supabase error:', error);
            showError(error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Free Account';
            return;
        }

        if (data?.user?.identities?.length === 0) {
            showError('An account with this email already exists.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Free Account';
            return;
        }

        console.log('Signup success:', data);
        submitBtn.textContent = '‚úì Account Created!';
        submitBtn.style.background = 'linear-gradient(135deg, #34d399, #06b6d4)';

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1500);
    });
</script>
</body>
</html>
