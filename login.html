<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Contract Aegis</title>
    <meta name="description" content="Log in to your Contract Aegis account to access your analysis history and settings.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ─── NAV ───────────────────────────────────────── -->
<nav id="mainNav" class="scrolled">
    <div class="nav-inner">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="nav-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="nav-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z" stroke="url(#nav-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 12l2 2 4-4" stroke="url(#nav-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Contract Aegis</span>
        </a>
        <div class="nav-actions" style="margin-left:auto;">
            <a href="signup.html" class="nav-btn nav-btn-primary">Sign Up</a>
        </div>
    </div>
</nav>

<!-- ─── LOGIN PAGE ────────────────────────────────── -->
<main class="auth-page">
    <div class="auth-glow"></div>

    <div class="auth-card">
        <div class="auth-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="card-sg" x1="3" y1="2" x2="21" y2="23" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                    <linearGradient id="card-cg" x1="9" y1="10" x2="15" y2="14" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#34d399"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
                <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z" stroke="url(#card-sg)" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M9 12l2 2 4-4" stroke="url(#card-cg)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Contract Aegis
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Log in to your account to access your contract analysis history and settings.</p>

        <button class="auth-google-btn" id="googleBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
        </button>

        <div class="auth-divider">
            <span>or</span>
        </div>

        <form class="auth-form" id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="jane@example.com"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <!-- Inline error message -->
            <div id="formError" style="
                display: none;
                background: rgba(239,68,68,0.1);
                border: 1px solid rgba(239,68,68,0.3);
                border-radius: 8px;
                padding: 10px 14px;
                font-size: 13px;
                color: #ef4444;
            "></div>

            <button type="submit" class="auth-submit" id="submitBtn">
                Log In
            </button>
        </form>

        <p class="auth-footer-text">
            Don't have an account? <a href="signup.html">Sign up free</a>
        </p>
    </div>
</main>

<script>
    const sb = window.supabase.createClient(
        'https://xdhmexgxhjalxieiwzcj.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkaG1leGd4aGphbHhpZWl3emNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNjczOTUsImV4cCI6MjA4Nzg0MzM5NX0.kqIGkdEpvNosppqZMmXPTDfdqiTs95ZTc8I7fIABIaM'
    );

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');

    function showError(msg) {
        formError.textContent = msg;
        formError.style.display = 'block';
    }

    function hideError() {
        formError.style.display = 'none';
    }

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Google login
    document.getElementById('googleBtn').addEventListener('click', async () => {
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/index.html'
            }
        });
        if (error) showError(error.message);
    });

    // Email/password login
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email    = form.email.value.trim();
        const password = form.password.value;

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('Please enter a valid email address.');
            return;
        }
        if (!password) {
            showError('Please enter your password.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in…';

        const passwordHash = await hashPassword(password);

        const { data, error } = await sb
            .from('users')
            .select('*')
            .eq('email', email.toLowerCase())
            .eq('password_hash', passwordHash)
            .single();

        if (error || !data) {
            showError('Invalid email or password.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
            return;
        }

        localStorage.setItem('cg_user', JSON.stringify({
            id: data.id,
            email: data.email
        }));

        window.location.href = 'index.html';
    });
</script>
</body>
</html>
